name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt pytest

      - name: Generate temporary RSA keypair for JWT tests
        run: |
          openssl genrsa -out private.pem 2048
          openssl rsa -in private.pem -pubout -out public.pem

      - name: Run tests
        working-directory: backend
        env:
          PYTHONPATH: .
          JWT_PRIVATE_KEY_PATH: ${{ github.workspace }}/private.pem
          JWT_PUBLIC_KEY_PATH: ${{ github.workspace }}/public.pem
        run: pytest 
